# Enemy: Tempest Reborn keyboard joystick profile.
#
# FS-UAE's default Amiga keyboard joystick mapping already provides:
#   cursor keys = joystick directions
#   right Ctrl / right Alt = fire
#
# This profile adds WASD and Space while preserving the default mapping.

[device]
name = Keyboard
type = keyboard
attached = 1

[default]
include = default_keyboard

[amiga]
key_a = left
key_d = right
key_w = up
key_s = down
key_space = 1
