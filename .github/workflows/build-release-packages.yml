name: Build release packages

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release/package version
        required: false
        default: v0.6
  push:
    tags:
      - "v*"

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev rsync
          sudo apt-get install -y fuse libfuse2
          sudo apt-get install -y fs-uae || true
      - name: Install appimagetool
        shell: bash
        run: |
          curl -L -o appimagetool-x86_64.AppImage https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
      - name: Build Linux package
        shell: bash
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ]; then version="${GITHUB_REF_NAME:-v0.6}"; fi
          fs_uae="$(command -v fs-uae || true)"
          if [ -n "$fs_uae" ]; then
            VERSION="$version" FS_UAE_BUNDLE_BIN="$fs_uae" APPIMAGETOOL="$PWD/appimagetool-x86_64.AppImage" ./scripts/package_linux_appimage.sh
          else
            VERSION="$version" APPIMAGETOOL="$PWD/appimagetool-x86_64.AppImage" ./scripts/package_linux_appimage.sh
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: enemy-tempest-reborn-linux-x64
          path: |
            dist/*linux-x64.tar.gz
            dist/*linux-x64.tar.gz.sha256
            dist/*linux-x64.AppImage
            dist/*linux-x64.AppImage.sha256

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Try install FS-UAE
        shell: pwsh
        run: |
          choco install fs-uae -y --no-progress
        continue-on-error: true
      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
      - name: Build Windows package
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) { $version = "${env:GITHUB_REF_NAME}" }
          if ([string]::IsNullOrWhiteSpace($version)) { $version = "v0.6" }
          $fsUae = Get-Command "fs-uae.exe" -ErrorAction SilentlyContinue
          if (-not $fsUae) {
            $candidatePaths = @(
              "${env:ProgramFiles}\FS-UAE\fs-uae.exe",
              "${env:ProgramFiles(x86)}\FS-UAE\fs-uae.exe",
              "C:\Program Files\FS-UAE\fs-uae.exe",
              "C:\Program Files (x86)\FS-UAE\fs-uae.exe"
            )
            $fsUae = $candidatePaths | Where-Object { Test-Path $_ } | Select-Object -First 1
          }
          if ($fsUae) {
            $fsUaePath = if ($fsUae.Source) { $fsUae.Source } else { [string]$fsUae }
            .\scripts\package_windows_installer.ps1 -Version $version -FsUaeBundleBin $fsUaePath
          } else {
            .\scripts\package_windows_installer.ps1 -Version $version
          }
      - uses: actions/upload-artifact@v4
        with:
          name: enemy-tempest-reborn-windows-x64
          path: |
            dist/*windows-x64.zip
            dist/*windows-x64.zip.sha256
            dist/*windows-x64-setup.exe
            dist/*windows-x64-setup.exe.sha256

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Try install FS-UAE
        run: |
          brew install --cask fs-uae || true
      - name: Build macOS package
        shell: bash
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ]; then version="${GITHUB_REF_NAME:-v0.6}"; fi
          fs_uae=""
          for candidate in \
            "/Applications/FS-UAE.app/Contents/MacOS/fs-uae" \
            "/Applications/FS-UAE Launcher.app/Contents/MacOS/fs-uae" \
            "$(command -v fs-uae || true)"
          do
            if [ -n "$candidate" ] && [ -x "$candidate" ]; then
              fs_uae="$candidate"
              break
            fi
          done
          if [ -n "$fs_uae" ]; then
            VERSION="$version" FS_UAE_BUNDLE_BIN="$fs_uae" ./scripts/package_macos_universal.sh
          else
            VERSION="$version" ./scripts/package_macos_universal.sh
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: enemy-tempest-reborn-macos
          path: |
            dist/*macos-universal.zip
            dist/*macos-universal.zip.sha256

  release:
    runs-on: ubuntu-24.04
    needs:
      - linux
      - windows
      - macos
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ]; then version="${GITHUB_REF_NAME:-v0.6}"; fi
          if gh release view "$version" >/dev/null 2>&1; then
            gh release upload "$version" release-assets/* --clobber
          else
            gh release create "$version" release-assets/* \
              --title "Enemy: Tempest Reborn ${version}" \
              --notes "Release ${version}: bundled launcher, FS-UAE profiles, Windows installer, Linux AppImage, and portable packages."
          fi
