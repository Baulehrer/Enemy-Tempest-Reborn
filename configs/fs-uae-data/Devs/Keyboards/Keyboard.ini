# Enemy: Tempest Reborn keyboard joystick profile.
#
# Keep the Amiga joystick mapping explicit. Inheriting FS-UAE's
# default_keyboard made arrow-key behavior ambiguous on some hosts.

[device]
name = Keyboard
type = keyboard
attached = 1

[default]
include = default_keyboard

[amiga]
key_left = left
key_right = right
key_up = up
key_down = down
key_a = left
key_d = right
key_w = up
key_s = down
key_space = 1
key_rctrl = 1
key_ralt = 1
key_rshift = 1
