name: Build release packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release/package version
        required: false
        default: v0.2.0-dev
  push:
    tags:
      - "v*"

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev rsync
          sudo apt-get install -y fs-uae || true
      - name: Build Linux package
        shell: bash
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ]; then version="${GITHUB_REF_NAME:-v0.2.0-dev}"; fi
          fs_uae="$(command -v fs-uae || true)"
          if [ -n "$fs_uae" ]; then
            VERSION="$version" FS_UAE_BUNDLE_BIN="$fs_uae" ./scripts/package_linux_x64.sh
          else
            VERSION="$version" ./scripts/package_linux_x64.sh
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: enemy-tempest-reborn-linux-x64
          path: |
            dist/*linux-x64.tar.gz
            dist/*linux-x64.tar.gz.sha256

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Try install FS-UAE
        shell: pwsh
        run: |
          choco install fs-uae -y --no-progress
        continue-on-error: true
      - name: Build Windows package
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) { $version = "${env:GITHUB_REF_NAME}" }
          if ([string]::IsNullOrWhiteSpace($version)) { $version = "v0.2.0-dev" }
          $fsUae = Get-ChildItem -Path "${env:ProgramFiles}", "${env:ProgramFiles(x86)}" -Filter "fs-uae.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($fsUae) {
            .\scripts\package_windows_x64.ps1 -Version $version -FsUaeBundleBin $fsUae.FullName
          } else {
            .\scripts\package_windows_x64.ps1 -Version $version
          }
      - uses: actions/upload-artifact@v4
        with:
          name: enemy-tempest-reborn-windows-x64
          path: |
            dist/*windows-x64.zip
            dist/*windows-x64.zip.sha256

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Try install FS-UAE
        run: |
          brew install --cask fs-uae || true
      - name: Build macOS package
        shell: bash
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ]; then version="${GITHUB_REF_NAME:-v0.2.0-dev}"; fi
          fs_uae=""
          for candidate in \
            "/Applications/FS-UAE.app/Contents/MacOS/fs-uae" \
            "/Applications/FS-UAE Launcher.app/Contents/MacOS/fs-uae" \
            "$(command -v fs-uae || true)"
          do
            if [ -n "$candidate" ] && [ -x "$candidate" ]; then
              fs_uae="$candidate"
              break
            fi
          done
          if [ -n "$fs_uae" ]; then
            VERSION="$version" FS_UAE_BUNDLE_BIN="$fs_uae" ./scripts/package_macos_universal.sh
          else
            VERSION="$version" ./scripts/package_macos_universal.sh
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: enemy-tempest-reborn-macos
          path: |
            dist/*macos-universal.zip
            dist/*macos-universal.zip.sha256
